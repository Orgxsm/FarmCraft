<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartFarm Multiplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Fredoka',sans-serif}
canvas{display:block}

/* ─── JOIN SCREEN ─── */
#join-screen{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse,rgba(0,15,10,0.97),rgba(0,0,0,0.99));display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center}
#join-screen h1{font-size:48px;margin-bottom:6px;background:linear-gradient(135deg,#66bb6a,#00ccff,#FFD54F);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#join-screen .sub{font-size:13px;opacity:.4;margin-bottom:24px;letter-spacing:3px;text-transform:uppercase}
#join-screen input{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 24px;font-size:16px;color:#fff;font-family:inherit;width:280px;text-align:center;margin-bottom:16px;outline:none;transition:border-color .3s}
#join-screen input:focus{border-color:#66bb6a}
#join-screen input::placeholder{color:rgba(255,255,255,0.3)}
#join-screen button{background:linear-gradient(135deg,#43A047,#00aa88);border:none;color:#fff;padding:14px 44px;font-size:17px;border-radius:50px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .3s;box-shadow:0 4px 20px rgba(0,170,136,0.3)}
#join-screen button:hover{transform:scale(1.06);box-shadow:0 8px 35px rgba(0,170,136,0.45)}
#join-screen .info{font-size:12px;opacity:.35;margin-top:16px}

/* ─── HUD ─── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:8px 12px;z-index:10;pointer-events:none;flex-wrap:wrap}
.resource{display:flex;align-items:center;gap:4px;color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);padding:5px 12px;border-radius:18px;border:1px solid rgba(255,255,255,0.08);transition:transform .2s}
.resource .icon{font-size:16px}
.resource .val{min-width:20px;text-align:center}
.resource.data-res{border-color:rgba(0,200,255,0.3);background:rgba(0,40,60,0.6)}

/* ─── BUILD MENU ─── */
#build-menu{position:fixed;bottom:44px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:10px 8px 10px;z-index:10;flex-wrap:wrap;max-height:35vh;overflow-y:auto}
.build-btn{background:rgba(15,15,25,0.75);backdrop-filter:blur(14px);border:2px solid rgba(255,255,255,0.08);border-radius:12px;padding:8px 10px;color:#fff;cursor:pointer;text-align:center;transition:all .25s;min-width:90px;position:relative}
.build-btn:hover:not(.locked):not(.built){background:rgba(76,175,80,0.25);border-color:#66bb6a;transform:translateY(-3px)}
.build-btn.active{background:rgba(76,175,80,0.3);border-color:#66bb6a;box-shadow:0 0 15px rgba(76,175,80,0.25)}
.build-btn.locked{opacity:.3;cursor:not-allowed}
.build-btn.built{opacity:.55;border-color:rgba(76,175,80,0.3);cursor:default}
.build-btn.iot-btn{border-color:rgba(0,200,255,0.2)}
.build-btn .b-icon{font-size:22px}
.build-btn .b-name{font-size:10px;font-weight:600;margin:3px 0 1px;letter-spacing:.3px}
.build-btn .b-cost{font-size:9px;opacity:.55}

/* ─── TAB BAR ─── */
#tab-bar{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:center;gap:0;z-index:11;pointer-events:all}
.tab-btn{background:rgba(10,10,20,0.85);color:#fff;border:none;padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border-top:2px solid transparent;transition:all .2s;letter-spacing:.5px}
.tab-btn:hover{background:rgba(30,30,50,0.9)}
.tab-btn.active{border-top-color:#66bb6a;background:rgba(30,50,30,0.9)}

/* ─── PLAYER LIST ─── */
#player-list{position:fixed;top:50px;right:10px;z-index:12;display:none;background:rgba(5,8,15,0.88);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;color:#fff;font-size:11px;min-width:140px}
#player-list h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.4;margin-bottom:6px}
.player-entry{display:flex;align-items:center;gap:6px;padding:3px 0}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.player-name{font-weight:600;font-size:11px}
.player-you{opacity:.5;font-size:9px}

/* ─── CHAT ─── */
#chat-box{position:fixed;bottom:50px;left:10px;z-index:12;display:none;width:300px}
#chat-messages{background:rgba(5,8,15,0.8);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.05);border-radius:10px 10px 0 0;padding:8px;max-height:150px;overflow-y:auto;font-size:11px;color:#fff;scrollbar-width:thin}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.chat-msg{margin-bottom:3px;line-height:1.4;word-break:break-word}
.chat-msg .sender{font-weight:600}
#chat-input-box{display:flex}
#chat-input{flex:1;background:rgba(10,10,20,0.9);border:1px solid rgba(255,255,255,0.1);border-top:none;border-radius:0 0 0 10px;padding:8px 10px;color:#fff;font-size:12px;font-family:inherit;outline:none}
#chat-input::placeholder{color:rgba(255,255,255,0.25)}
#chat-send{background:rgba(76,175,80,0.4);border:1px solid rgba(255,255,255,0.1);border-top:none;border-left:none;border-radius:0 0 10px 0;padding:8px 14px;color:#fff;cursor:pointer;font-size:12px;font-family:inherit}

/* ─── TOOLTIP ─── */
#tooltip{position:fixed;display:none;background:rgba(8,8,18,0.92);color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;pointer-events:none;z-index:20;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(14px);max-width:250px;line-height:1.5}

/* ─── POPUPS & MESSAGES ─── */
.popup{position:fixed;pointer-events:none;z-index:15;font-size:18px;font-weight:700;animation:popUp 1.3s cubic-bezier(.4,0,.2,1) forwards}
.popup.res-wood{color:#8BC34A;text-shadow:0 0 10px rgba(139,195,74,0.5)}
.popup.res-stone{color:#90A4AE;text-shadow:0 0 10px rgba(144,164,174,0.5)}
.popup.res-data{color:#00ddff;text-shadow:0 0 12px rgba(0,200,255,0.6)}
.popup.production{color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,0.5)}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.15)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

#messages{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:15;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.msg{background:rgba(8,8,18,0.88);color:#fff;padding:7px 18px;border-radius:10px;font-size:12px;backdrop-filter:blur(10px);animation:msgFade 3.5s ease-out forwards;border:1px solid rgba(255,255,255,0.05)}
@keyframes msgFade{0%,55%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-18px)}}

#day-indicator{position:fixed;top:8px;right:14px;z-index:10;color:#fff;font-size:12px;opacity:.45;background:rgba(0,0,0,0.4);padding:3px 10px;border-radius:10px}

/* ─── WIN OVERLAY ─── */
#win-screen{position:fixed;inset:0;z-index:100;display:none;background:rgba(0,0,0,0.88);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center}
#win-screen h1{font-size:48px;background:linear-gradient(135deg,#FFD700,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#win-screen p{font-size:18px;opacity:.7;margin-top:12px}

/* ─── PLACEMENT INDICATOR ─── */
#placement-hint{display:none;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:12;color:#fff;font-size:13px;background:rgba(76,175,80,0.3);border:1px solid rgba(76,175,80,0.4);padding:8px 18px;border-radius:20px;backdrop-filter:blur(8px);pointer-events:none;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.8}50%{opacity:1}}

/* ─── MOBILE RESPONSIVE ─── */
#mobile-hint{display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:12;color:#fff;font-size:12px;opacity:.6;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:16px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none;animation:hintFade 4s ease-out forwards}
@keyframes hintFade{0%,60%{opacity:.6}100%{opacity:0}}

@media(max-width:768px){
  #hud{gap:3px;padding:6px 6px}
  .resource{font-size:11px;padding:3px 8px;gap:3px;border-radius:14px}
  .resource .icon{font-size:13px}
  .resource .val{min-width:16px}

  #build-menu{gap:4px;padding:8px 6px 8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;justify-content:flex-start;scrollbar-width:none;max-height:none;bottom:40px}
  #build-menu::-webkit-scrollbar{display:none}
  .build-btn{min-width:72px;padding:7px 8px;border-radius:10px;flex-shrink:0}
  .build-btn .b-icon{font-size:18px}
  .build-btn .b-name{font-size:9px;margin:2px 0 1px}
  .build-btn .b-cost{font-size:8px}
  .build-btn:hover:not(.locked):not(.built){transform:none}

  .tab-btn{padding:8px 12px;font-size:11px}

  #join-screen h1{font-size:32px}
  #join-screen .sub{font-size:11px;letter-spacing:2px}
  #join-screen input{width:240px;font-size:14px;padding:12px 18px}
  #join-screen button{padding:12px 34px;font-size:15px}

  #player-list{right:5px;top:44px;min-width:120px;padding:8px 10px}
  #chat-box{width:calc(100% - 20px);left:10px}
  #chat-messages{max-height:100px}

  #messages{top:44px}
  .msg{font-size:11px;padding:5px 12px}
  #day-indicator{font-size:10px;top:5px;right:6px;padding:2px 8px}
  #tooltip{display:none!important}
  #mobile-hint{display:block}
  #placement-hint{font-size:11px;bottom:95px;padding:6px 14px}
}

@media(max-width:480px){
  #hud{gap:2px;padding:4px 4px}
  .resource{font-size:10px;padding:2px 6px}
  .resource .icon{font-size:11px}
  .build-btn{min-width:62px;padding:5px 6px}
  .build-btn .b-icon{font-size:16px}
  .build-btn .b-name{font-size:8px}
  .build-btn .b-cost{font-size:7px}
  .tab-btn{padding:6px 8px;font-size:10px}
  #join-screen h1{font-size:26px}
  #join-screen input{width:200px}
}

@media(max-height:500px) and (orientation:landscape){
  #hud{padding:3px 6px;gap:3px}
  .resource{font-size:10px;padding:2px 6px}
  #build-menu{padding:4px 6px 4px;bottom:36px}
  .build-btn{min-width:58px;padding:5px 6px}
  .build-btn .b-icon{font-size:16px}
  .build-btn .b-name{font-size:8px}
  .tab-btn{padding:6px 10px;font-size:10px}
  #messages{top:32px}
  #chat-box{bottom:42px}
}
</style>
</head>
<body>

<div id="join-screen">
  <h1>SmartFarm</h1>
  <div class="sub">Multiplayer Farming</div>
  <input type="text" id="player-name" placeholder="Ton pseudo..." maxlength="16" autocomplete="off">
  <br>
  <button id="join-btn">Rejoindre</button>
  <div class="info">Jusqu'a 8 joueurs sur la meme map</div>
</div>

<div id="win-screen"><h1 id="win-title"></h1><p id="win-text"></p></div>

<div id="hud" style="display:none">
  <div class="resource"><span class="icon">🪵</span><span class="val" id="r-wood">0</span></div>
  <div class="resource"><span class="icon">🪨</span><span class="val" id="r-stone">0</span></div>
  <div class="resource"><span class="icon">💧</span><span class="val" id="r-water">0</span></div>
  <div class="resource"><span class="icon">🌾</span><span class="val" id="r-food">0</span></div>
  <div class="resource"><span class="icon">⚡</span><span class="val" id="r-energy">0</span></div>
  <div class="resource"><span class="icon">🪙</span><span class="val" id="r-gold">0</span></div>
  <div class="resource data-res"><span class="icon">📊</span><span class="val" id="r-data">0</span></div>
</div>

<div id="day-indicator" style="display:none">Jour 1</div>
<div id="messages"></div>
<div id="build-menu" style="display:none"></div>
<div id="tooltip"></div>
<div id="placement-hint">Clique sur le terrain pour placer le batiment</div>
<div id="mobile-hint">Touche les arbres et rochers pour recolter</div>

<div id="player-list">
  <h4>Joueurs</h4>
  <div id="players-container"></div>
</div>

<div id="chat-box">
  <div id="chat-messages"></div>
  <div id="chat-input-box">
    <input type="text" id="chat-input" placeholder="Message..." maxlength="200" autocomplete="off">
    <button id="chat-send">Envoyer</button>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="build">🔨 Construire</button>
  <button class="tab-btn" data-tab="chat">💬 Chat</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js" type="module"></script>
</body>
</html>
