<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartFarm Multiplayer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Fredoka',sans-serif}
canvas{display:block}

/* ─── JOIN SCREEN (Pokopia warm & cozy) ─── */
#join-screen{position:fixed;inset:0;z-index:200;background:radial-gradient(ellipse at 50% 40%,rgba(120,180,100,0.95),rgba(60,100,60,0.97),rgba(20,40,30,0.99));display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center}
#join-screen h1{font-size:52px;margin-bottom:8px;background:linear-gradient(135deg,#FFE066,#FF8844,#FF6B6B,#66BB6A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:2px}
#join-screen .sub{font-size:13px;opacity:.5;margin-bottom:28px;letter-spacing:3px;text-transform:uppercase;color:#E8F0D8}
#join-screen input{background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,200,0.25);border-radius:20px;padding:14px 24px;font-size:16px;color:#fff;font-family:inherit;width:280px;text-align:center;margin-bottom:16px;outline:none;transition:border-color .3s}
#join-screen input:focus{border-color:#FFD54F}
#join-screen input::placeholder{color:rgba(255,255,230,0.35)}
#join-screen button{background:linear-gradient(135deg,#FF8844,#FFB347);border:none;color:#fff;padding:14px 44px;font-size:17px;border-radius:50px;cursor:pointer;font-weight:700;font-family:inherit;transition:all .3s;box-shadow:0 4px 25px rgba(255,136,68,0.35);text-shadow:0 1px 2px rgba(0,0,0,0.2)}
#join-screen button:hover{transform:scale(1.06);box-shadow:0 8px 40px rgba(255,136,68,0.5)}
#join-screen .info{font-size:12px;opacity:.4;margin-top:16px;color:#D8E8C0}

/* ─── HUD (Pokopia warm rounded pills) ─── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:8px 12px;z-index:10;pointer-events:none;flex-wrap:wrap}
.resource{display:flex;align-items:center;gap:4px;color:#4A3520;font-size:13px;font-weight:600;background:rgba(255,248,230,0.88);backdrop-filter:blur(12px);padding:5px 14px;border-radius:22px;border:2px solid rgba(200,170,100,0.25);transition:transform .2s;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.resource .icon{font-size:16px}
.resource .val{min-width:20px;text-align:center}
.resource.data-res{border-color:rgba(100,180,220,0.4);background:rgba(230,245,255,0.88);color:#2A4A5A}

/* ─── BUILD MENU (Pokopia rounded cards) ─── */
#build-menu{position:fixed;bottom:44px;left:0;right:0;display:flex;justify-content:center;gap:6px;padding:10px 8px 10px;z-index:10;flex-wrap:wrap;max-height:35vh;overflow-y:auto}
.build-btn{background:rgba(255,248,235,0.88);backdrop-filter:blur(14px);border:2px solid rgba(200,170,110,0.2);border-radius:16px;padding:8px 10px;color:#4A3520;cursor:pointer;text-align:center;transition:all .25s;min-width:90px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.build-btn:hover:not(.locked):not(.built){background:rgba(255,220,150,0.9);border-color:#FFB347;transform:translateY(-3px);box-shadow:0 4px 15px rgba(255,160,60,0.2)}
.build-btn.active{background:rgba(255,220,150,0.92);border-color:#FF8844;box-shadow:0 0 18px rgba(255,136,68,0.25)}
.build-btn.locked{opacity:.3;cursor:not-allowed}
.build-btn.built{opacity:.6;border-color:rgba(120,180,80,0.4);background:rgba(220,245,210,0.85);cursor:default}
.build-btn.iot-btn{border-color:rgba(100,180,220,0.3)}
.build-btn .b-icon{font-size:24px}
.build-btn .b-name{font-size:10px;font-weight:600;margin:3px 0 1px;letter-spacing:.3px}
.build-btn .b-cost{font-size:9px;opacity:.55}

/* ─── TAB BAR (Pokopia warm) ─── */
#tab-bar{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:center;gap:0;z-index:11;pointer-events:all}
.tab-btn{background:rgba(255,248,235,0.92);color:#5A4030;border:none;padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border-top:3px solid transparent;transition:all .2s;letter-spacing:.5px}
.tab-btn:hover{background:rgba(255,240,210,0.95)}
.tab-btn.active{border-top-color:#FF8844;background:rgba(255,235,200,0.95);color:#CC5500}

/* ─── PLAYER LIST (Pokopia warm panel) ─── */
#player-list{position:fixed;top:50px;right:10px;z-index:12;display:none;background:rgba(255,248,235,0.92);backdrop-filter:blur(14px);border:2px solid rgba(200,170,100,0.2);border-radius:16px;padding:10px 14px;color:#4A3520;font-size:11px;min-width:140px;box-shadow:0 3px 12px rgba(0,0,0,0.08)}
#player-list h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:6px;color:#8A7050}
.player-entry{display:flex;align-items:center;gap:6px;padding:3px 0}
.player-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px rgba(0,0,0,0.15)}
.player-name{font-weight:600;font-size:11px;color:#4A3520}
.player-you{opacity:.5;font-size:9px;color:#8A7050}

/* ─── CHAT (Pokopia warm) ─── */
#chat-box{position:fixed;bottom:50px;left:10px;z-index:12;display:none;width:300px}
#chat-messages{background:rgba(255,248,235,0.9);backdrop-filter:blur(10px);border:2px solid rgba(200,170,100,0.2);border-radius:14px 14px 0 0;padding:8px;max-height:150px;overflow-y:auto;font-size:11px;color:#4A3520;scrollbar-width:thin}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:rgba(180,150,100,0.3);border-radius:2px}
.chat-msg{margin-bottom:3px;line-height:1.4;word-break:break-word}
.chat-msg .sender{font-weight:600}
#chat-input-box{display:flex}
#chat-input{flex:1;background:rgba(255,252,245,0.95);border:2px solid rgba(200,170,100,0.2);border-top:none;border-radius:0 0 0 14px;padding:8px 10px;color:#4A3520;font-size:12px;font-family:inherit;outline:none}
#chat-input::placeholder{color:rgba(140,120,80,0.4)}
#chat-send{background:rgba(255,180,80,0.5);border:2px solid rgba(200,170,100,0.2);border-top:none;border-left:none;border-radius:0 0 14px 0;padding:8px 14px;color:#6A4A20;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600}

/* ─── TOOLTIP (Pokopia warm) ─── */
#tooltip{position:fixed;display:none;background:rgba(255,248,235,0.95);color:#4A3520;padding:10px 16px;border-radius:14px;font-size:12px;pointer-events:none;z-index:20;border:2px solid rgba(200,170,100,0.25);backdrop-filter:blur(14px);max-width:250px;line-height:1.5;box-shadow:0 3px 12px rgba(0,0,0,0.1)}

/* ─── POPUPS & MESSAGES (Pokopia warm) ─── */
.popup{position:fixed;pointer-events:none;z-index:15;font-size:20px;font-weight:700;animation:popUp 1.3s cubic-bezier(.4,0,.2,1) forwards}
.popup.res-wood{color:#6DB83E;text-shadow:0 0 12px rgba(109,184,62,0.5)}
.popup.res-stone{color:#9E9E9E;text-shadow:0 0 10px rgba(160,160,160,0.5)}
.popup.res-data{color:#55BBEE;text-shadow:0 0 12px rgba(85,187,238,0.6)}
.popup.production{color:#FFB347;text-shadow:0 0 12px rgba(255,179,71,0.5)}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

#messages{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:15;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.msg{background:rgba(255,248,235,0.92);color:#4A3520;padding:8px 20px;border-radius:14px;font-size:12px;backdrop-filter:blur(10px);animation:msgFade 3.5s ease-out forwards;border:2px solid rgba(200,170,100,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
@keyframes msgFade{0%,55%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-18px)}}

#day-indicator{position:fixed;top:8px;right:14px;z-index:10;color:#6A5030;font-size:12px;background:rgba(255,248,235,0.85);padding:4px 12px;border-radius:14px;border:1px solid rgba(200,170,100,0.2);font-weight:600}

/* ─── WIN OVERLAY (Pokopia celebration) ─── */
#win-screen{position:fixed;inset:0;z-index:100;display:none;background:radial-gradient(ellipse,rgba(255,220,150,0.95),rgba(200,160,80,0.97));flex-direction:column;align-items:center;justify-content:center;color:#4A3520;text-align:center}
#win-screen h1{font-size:52px;background:linear-gradient(135deg,#FF6B6B,#FFB347,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#win-screen p{font-size:18px;opacity:.7;margin-top:12px;color:#6A5030}

/* ─── PLACEMENT INDICATOR (Pokopia) ─── */
#placement-hint{display:none;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:12;color:#6A4A20;font-size:13px;background:rgba(255,220,150,0.88);border:2px solid rgba(255,180,80,0.4);padding:8px 20px;border-radius:22px;backdrop-filter:blur(8px);pointer-events:none;font-weight:600;animation:pulse 2s ease-in-out infinite;box-shadow:0 2px 10px rgba(255,160,60,0.15)}
@keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}

/* ─── MOBILE RESPONSIVE ─── */
#mobile-hint{display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:12;color:#6A5030;font-size:12px;opacity:.7;background:rgba(255,248,235,0.85);padding:6px 14px;border-radius:18px;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none;border:1px solid rgba(200,170,100,0.2);animation:hintFade 4s ease-out forwards;font-weight:500}
@keyframes hintFade{0%,60%{opacity:.7}100%{opacity:0}}

@media(max-width:768px){
  #hud{gap:3px;padding:6px 6px}
  .resource{font-size:11px;padding:3px 8px;gap:3px;border-radius:14px}
  .resource .icon{font-size:13px}
  .resource .val{min-width:16px}

  #build-menu{gap:4px;padding:8px 6px 8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;justify-content:flex-start;scrollbar-width:none;max-height:none;bottom:40px}
  #build-menu::-webkit-scrollbar{display:none}
  .build-btn{min-width:72px;padding:7px 8px;border-radius:10px;flex-shrink:0}
  .build-btn .b-icon{font-size:18px}
  .build-btn .b-name{font-size:9px;margin:2px 0 1px}
  .build-btn .b-cost{font-size:8px}
  .build-btn:hover:not(.locked):not(.built){transform:none}

  .tab-btn{padding:8px 12px;font-size:11px}

  #join-screen h1{font-size:32px}
  #join-screen .sub{font-size:11px;letter-spacing:2px}
  #join-screen input{width:240px;font-size:14px;padding:12px 18px}
  #join-screen button{padding:12px 34px;font-size:15px}

  #player-list{right:5px;top:44px;min-width:120px;padding:8px 10px}
  #chat-box{width:calc(100% - 20px);left:10px}
  #chat-messages{max-height:100px}

  #messages{top:44px}
  .msg{font-size:11px;padding:5px 12px}
  #day-indicator{font-size:10px;top:5px;right:6px;padding:2px 8px}
  #tooltip{display:none!important}
  #mobile-hint{display:block}
  #placement-hint{font-size:11px;bottom:95px;padding:6px 14px}
}

@media(max-width:480px){
  #hud{gap:2px;padding:4px 4px}
  .resource{font-size:10px;padding:2px 6px}
  .resource .icon{font-size:11px}
  .build-btn{min-width:62px;padding:5px 6px}
  .build-btn .b-icon{font-size:16px}
  .build-btn .b-name{font-size:8px}
  .build-btn .b-cost{font-size:7px}
  .tab-btn{padding:6px 8px;font-size:10px}
  #join-screen h1{font-size:26px}
  #join-screen input{width:200px}
}

@media(max-height:500px) and (orientation:landscape){
  #hud{padding:3px 6px;gap:3px}
  .resource{font-size:10px;padding:2px 6px}
  #build-menu{padding:4px 6px 4px;bottom:36px}
  .build-btn{min-width:58px;padding:5px 6px}
  .build-btn .b-icon{font-size:16px}
  .build-btn .b-name{font-size:8px}
  .tab-btn{padding:6px 10px;font-size:10px}
  #messages{top:32px}
  #chat-box{bottom:42px}
}
</style>
</head>
<body>

<div id="join-screen">
  <h1>SmartFarm</h1>
  <div class="sub">Multiplayer Farming</div>
  <input type="text" id="player-name" placeholder="Ton pseudo..." maxlength="16" autocomplete="off">
  <br>
  <button id="join-btn">Rejoindre</button>
  <div class="info">Jusqu'a 8 joueurs sur la meme map</div>
</div>

<div id="win-screen"><h1 id="win-title"></h1><p id="win-text"></p></div>

<div id="hud" style="display:none">
  <div class="resource"><span class="icon">🪵</span><span class="val" id="r-wood">0</span></div>
  <div class="resource"><span class="icon">🪨</span><span class="val" id="r-stone">0</span></div>
  <div class="resource"><span class="icon">💧</span><span class="val" id="r-water">0</span></div>
  <div class="resource"><span class="icon">🌾</span><span class="val" id="r-food">0</span></div>
  <div class="resource"><span class="icon">⚡</span><span class="val" id="r-energy">0</span></div>
  <div class="resource"><span class="icon">🪙</span><span class="val" id="r-gold">0</span></div>
  <div class="resource data-res"><span class="icon">📊</span><span class="val" id="r-data">0</span></div>
</div>

<div id="day-indicator" style="display:none">Jour 1</div>
<div id="messages"></div>
<div id="build-menu" style="display:none"></div>
<div id="tooltip"></div>
<div id="placement-hint">Clique sur le terrain pour placer le batiment</div>
<div id="mobile-hint">Touche les arbres et rochers pour recolter</div>

<div id="player-list">
  <h4>Joueurs</h4>
  <div id="players-container"></div>
</div>

<div id="chat-box">
  <div id="chat-messages"></div>
  <div id="chat-input-box">
    <input type="text" id="chat-input" placeholder="Message..." maxlength="200" autocomplete="off">
    <button id="chat-send">Envoyer</button>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="build">🔨 Construire</button>
  <button class="tab-btn" data-tab="chat">💬 Chat</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="game.js" type="module"></script>
</body>
</html>
