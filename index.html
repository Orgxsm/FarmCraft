<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmCraft 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Fredoka', 'Segoe UI', sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 8px;
    padding: 10px 20px; z-index: 10; pointer-events: none;
  }
  .resource {
    display: flex; align-items: center; gap: 5px;
    color: #fff; font-size: 14px; font-weight: 600;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .resource .icon { font-size: 18px; }
  .resource .val { min-width: 24px; text-align: center; }

  #build-menu {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 8px;
    padding: 12px 10px 16px; z-index: 10; flex-wrap: wrap;
  }
  .build-btn {
    background: rgba(20,20,30,0.7); backdrop-filter: blur(16px);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 10px 14px;
    color: #fff; cursor: pointer; text-align: center;
    transition: all 0.25s cubic-bezier(.4,0,.2,1); min-width: 100px;
    position: relative; overflow: hidden;
  }
  .build-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
  }
  .build-btn:hover:not(.locked):not(.built) {
    background: rgba(76,175,80,0.25);
    border-color: #66bb6a;
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 8px 25px rgba(76,175,80,0.25);
  }
  .build-btn.active {
    background: rgba(76,175,80,0.35);
    border-color: #66bb6a;
    box-shadow: 0 0 20px rgba(76,175,80,0.3), inset 0 0 20px rgba(76,175,80,0.1);
  }
  .build-btn.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.5); }
  .build-btn.built { opacity: 0.5; border-color: rgba(76,175,80,0.4); cursor: default; }
  .build-btn .b-icon { font-size: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .build-btn .b-name { font-size: 11px; font-weight: 600; margin: 4px 0 2px; letter-spacing: 0.5px; }
  .build-btn .b-cost { font-size: 10px; opacity: 0.6; }

  #tooltip {
    position: fixed; display: none;
    background: rgba(10,10,20,0.9); color: #fff;
    padding: 8px 16px; border-radius: 10px;
    font-size: 13px; pointer-events: none; z-index: 20;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .popup {
    position: fixed; pointer-events: none; z-index: 15;
    font-size: 20px; font-weight: 700;
    text-shadow: 0 0 12px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.5);
    animation: popUp 1.4s cubic-bezier(.4,0,.2,1) forwards;
  }
  .popup.harvest-wood { color: #8BC34A; text-shadow: 0 0 12px rgba(139,195,74,0.6); }
  .popup.harvest-stone { color: #90A4AE; text-shadow: 0 0 12px rgba(144,164,174,0.6); }
  .popup.production { color: #FFD700; }
  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
  }

  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at center, rgba(10,20,10,0.95), rgba(0,0,0,0.98));
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff; text-align: center;
  }
  #intro h1 {
    font-size: 56px; margin-bottom: 8px; font-weight: 700;
    background: linear-gradient(135deg, #66bb6a, #FFD54F, #FF8A65);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }
  #intro .subtitle {
    font-size: 16px; opacity: 0.5; margin-bottom: 24px;
    letter-spacing: 3px; text-transform: uppercase;
  }
  #intro p {
    font-size: 15px; opacity: 0.6; margin-bottom: 36px;
    max-width: 480px; line-height: 1.7;
  }
  #intro button {
    background: linear-gradient(135deg, #43A047, #66BB6A);
    border: none; color: #fff;
    padding: 16px 48px; font-size: 18px; border-radius: 50px;
    cursor: pointer; font-weight: 600; font-family: inherit;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 4px 20px rgba(76,175,80,0.3);
    letter-spacing: 1px;
  }
  #intro button:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 40px rgba(76,175,80,0.5);
  }

  #win-screen {
    position: fixed; inset: 0; z-index: 100; display: none;
    background: radial-gradient(ellipse, rgba(0,0,0,0.8), rgba(0,0,0,0.95));
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center;
  }
  #win-screen h1 {
    font-size: 52px;
    background: linear-gradient(135deg, #FFD700, #FFA000);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #win-screen p { font-size: 18px; opacity: 0.7; margin-top: 12px; }

  #messages {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
    z-index: 15; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .msg {
    background: rgba(10,10,20,0.85); color: #fff; padding: 8px 20px;
    border-radius: 10px; font-size: 13px; backdrop-filter: blur(12px);
    animation: msgFade 3s ease-out forwards;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  @keyframes msgFade {
    0%,60% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  #day-indicator {
    position: fixed; top: 10px; right: 16px; z-index: 10;
    color: #fff; font-size: 13px; opacity: 0.5;
    background: rgba(0,0,0,0.4); padding: 4px 12px;
    border-radius: 12px; backdrop-filter: blur(8px);
  }

  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    pointer-events: none; z-index: 5; display: none;
  }
</style>
</head>
<body>

<div id="intro">
  <h1>FarmCraft</h1>
  <div class="subtitle">Build your dream farm</div>
  <p>Pars de zero sur un terrain sauvage. Recolte bois et pierre, construis ta ferme batiment par batiment, et developpe ton exploitation jusqu'au moulin !</p>
  <button onclick="startGame()">Jouer</button>
</div>

<div id="win-screen">
  <h1>Ferme Complete !</h1>
  <p>Bravo, tu as construit ta ferme de reve !</p>
</div>

<div id="hud">
  <div class="resource"><span class="icon">🪵</span> <span class="val" id="r-wood">0</span></div>
  <div class="resource"><span class="icon">🪨</span> <span class="val" id="r-stone">0</span></div>
  <div class="resource"><span class="icon">💧</span> <span class="val" id="r-water">0</span></div>
  <div class="resource"><span class="icon">🌾</span> <span class="val" id="r-food">0</span></div>
  <div class="resource"><span class="icon">🪙</span> <span class="val" id="r-gold">0</span></div>
</div>

<div id="day-indicator">Jour 1</div>
<div id="messages"></div>
<div id="build-menu"></div>
<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Utils ───
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));

// ─── Game State ───
const resources = { wood: 0, stone: 0, water: 0, food: 0, gold: 0 };
let gameTime = 0;
let dayCount = 1;
let selectedBuilding = null;
let gameStarted = false;
let buildingGhost = null;

const BUILDINGS = {
  cabin: {
    name: 'Cabane', icon: '🏡', cost: { wood: 10, stone: 5 },
    desc: 'Ton abri', size: [3, 3], unlocked: true, built: false,
    production: null, prerequisite: null
  },
  well: {
    name: 'Puits', icon: '🪣', cost: { wood: 5, stone: 8 },
    desc: '+2 eau / cycle', size: [2, 2], unlocked: false, built: false,
    production: { water: 2 }, prerequisite: 'cabin'
  },
  field: {
    name: 'Champ', icon: '🌾', cost: { wood: 8, stone: 3 },
    desc: '+3 food / cycle', size: [4, 4], unlocked: false, built: false,
    production: { food: 3 }, consumption: { water: 1 }, prerequisite: 'well'
  },
  barn: {
    name: 'Grange', icon: '🏚️', cost: { wood: 20, stone: 12 },
    desc: 'Stockage +50', size: [4, 3], unlocked: false, built: false,
    production: null, prerequisite: 'field'
  },
  coop: {
    name: 'Poulailler', icon: '🐔', cost: { wood: 15, stone: 5, food: 10 },
    desc: '+2 or / cycle', size: [3, 3], unlocked: false, built: false,
    production: { gold: 2 }, consumption: { food: 2 }, prerequisite: 'barn'
  },
  windmill: {
    name: 'Moulin', icon: '⚙️', cost: { wood: 30, stone: 20, gold: 10 },
    desc: 'x2 nourriture !', size: [3, 3], unlocked: false, built: false,
    production: { food: 6 }, consumption: { water: 1 }, prerequisite: 'coop'
  }
};

const builtStructures = [];
const harvestables = [];
const productionTimers = {};
const PRODUCTION_INTERVAL = 8;
const particles = []; // { mesh, vel, life, maxLife, type }
const smokeParticles = [];
const animatedChickens = [];

// ─── Three.js Setup ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 600);
camera.position.set(28, 22, 28);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.3, 0.5, 0.85
);
composer.addPass(bloomPass);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI / 2.15;
controls.minDistance = 8;
controls.maxDistance = 55;
controls.target.set(0, 0, 0);
controls.enablePan = true;
controls.panSpeed = 0.5;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.8);
sunLight.position.set(20, 30, 15);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.camera.left = -35;
sunLight.shadow.camera.right = 35;
sunLight.shadow.camera.top = 35;
sunLight.shadow.camera.bottom = -35;
sunLight.shadow.bias = -0.0002;
sunLight.shadow.normalBias = 0.02;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x99ccff, 0x337722, 0.35);
scene.add(hemiLight);

// Subtle fill light
const fillLight = new THREE.DirectionalLight(0x6688cc, 0.3);
fillLight.position.set(-15, 10, -10);
scene.add(fillLight);

// ─── Sky gradient ───
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

// ─── Terrain ───
const GROUND_SIZE = 70;
const groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, 80, 80);
const gPos = groundGeo.attributes.position;
const gColors = new Float32Array(gPos.count * 3);

// Height function
function terrainHeight(x, z) {
  return Math.sin(x * 0.15) * Math.cos(z * 0.12) * 0.6
    + Math.sin(x * 0.08 + 1) * Math.cos(z * 0.06 + 2) * 1.0
    + Math.sin(x * 0.3) * Math.cos(z * 0.35) * 0.15;
}

for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i), y = gPos.getY(i);
  const h = terrainHeight(x, y);
  gPos.setZ(i, h);

  // Vertex colors: darker in valleys, lighter on hills
  const t = (h + 1.5) / 3;
  const baseG = lerp(0.28, 0.55, t);
  const baseR = lerp(0.18, 0.35, t);
  const baseB = lerp(0.1, 0.2, t);
  // Add subtle noise
  const noise = rand(-0.03, 0.03);
  gColors[i * 3] = baseR + noise;
  gColors[i * 3 + 1] = baseG + noise;
  gColors[i * 3 + 2] = baseB + noise * 0.5;
}
groundGeo.setAttribute('color', new THREE.BufferAttribute(gColors, 3));
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.95, metalness: 0, flatShading: false
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Get height at world position
function getTerrainY(wx, wz) {
  return terrainHeight(wx, wz);
}

// ─── Path (dirt road) ───
function createPath() {
  const pathGroup = new THREE.Group();
  const pathMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 1.0, flatShading: true });
  const points = [];
  for (let t = -15; t <= 15; t += 1.5) {
    points.push(new THREE.Vector3(t, getTerrainY(t, t * 0.3) + 0.06, t * 0.3 + Math.sin(t * 0.3) * 2));
  }
  for (let i = 0; i < points.length - 1; i++) {
    const p1 = points[i], p2 = points[i + 1];
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const len = dir.length();
    const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const seg = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.05, len),
      pathMat
    );
    seg.position.copy(center);
    seg.lookAt(p2);
    seg.receiveShadow = true;
    pathGroup.add(seg);
  }
  scene.add(pathGroup);
}
createPath();

// ─── Water (animated lake) ───
const waterGeo = new THREE.CircleGeometry(5, 48);
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x2288cc, roughness: 0.05, metalness: 0.1,
  transparent: true, opacity: 0.75,
  clearcoat: 1.0, clearcoatRoughness: 0.1,
  envMapIntensity: 1.5
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.set(-14, getTerrainY(-14, 10) + 0.15, 10);
water.receiveShadow = true;
scene.add(water);

// Water edge rocks
for (let i = 0; i < 14; i++) {
  const angle = (i / 14) * Math.PI * 2 + rand(-0.2, 0.2);
  const r = 4.5 + rand(0, 1.5);
  const x = -14 + Math.cos(angle) * r;
  const z = 10 + Math.sin(angle) * r;
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(rand(0.2, 0.5), 0),
    new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0, 0, rand(0.4, 0.6)),
      roughness: 0.9, flatShading: true
    })
  );
  rock.position.set(x, getTerrainY(x, z) + 0.1, z);
  rock.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
  rock.castShadow = true;
  scene.add(rock);
}

// ─── Reeds near water ───
const reedMat = new THREE.MeshStandardMaterial({ color: 0x5a8a3c, roughness: 0.8 });
for (let i = 0; i < 20; i++) {
  const angle = rand(0, Math.PI * 2);
  const r = rand(3.5, 5.5);
  const x = -14 + Math.cos(angle) * r;
  const z = 10 + Math.sin(angle) * r;
  const h = rand(0.8, 1.8);
  const reed = new THREE.Mesh(
    new THREE.CylinderGeometry(0.015, 0.025, h, 4),
    reedMat
  );
  reed.position.set(x, getTerrainY(x, z) + h / 2, z);
  scene.add(reed);
}

// ─── Trees (multiple types) ───
function createPineTree(x, z, scale = 1) {
  const g = new THREE.Group();
  const h = rand(1.2, 2.0) * scale;

  // Trunk with slight taper
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12 * scale, 0.22 * scale, h, 6),
    new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.9 })
  );
  trunk.position.y = h / 2;
  trunk.castShadow = true;
  g.add(trunk);

  // Exposed roots
  for (let i = 0; i < 3; i++) {
    const root = new THREE.Mesh(
      new THREE.CylinderGeometry(0.02 * scale, 0.06 * scale, 0.4 * scale, 4),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.9 })
    );
    const a = (i / 3) * Math.PI * 2;
    root.position.set(Math.cos(a) * 0.15 * scale, 0.12, Math.sin(a) * 0.15 * scale);
    root.rotation.z = Math.cos(a) * 0.4;
    root.rotation.x = Math.sin(a) * 0.4;
    g.add(root);
  }

  // Layered foliage cones (4 layers)
  const leafColors = [0x1a6b3a, 0x228844, 0x2d8a4e, 0x1f7a3f];
  for (let i = 0; i < 4; i++) {
    const r = (1.4 - i * 0.22) * scale;
    const lh = (1.1 - i * 0.1) * scale;
    const leaf = new THREE.Mesh(
      new THREE.ConeGeometry(r, lh, 7),
      new THREE.MeshStandardMaterial({ color: leafColors[i % 4], roughness: 0.75, flatShading: true })
    );
    leaf.position.y = h + i * 0.55 * scale;
    leaf.castShadow = true;
    leaf.receiveShadow = true;
    g.add(leaf);
  }

  const ty = getTerrainY(x, z);
  g.position.set(x, ty, z);
  g.rotation.y = rand(0, Math.PI * 2);
  scene.add(g);
  return g;
}

function createOakTree(x, z, scale = 1) {
  const g = new THREE.Group();
  const h = rand(1.5, 2.2) * scale;

  // Trunk (thicker, organic)
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15 * scale, 0.3 * scale, h, 7),
    new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.95, flatShading: true })
  );
  trunk.position.y = h / 2;
  trunk.castShadow = true;
  g.add(trunk);

  // Branch stubs
  for (let i = 0; i < 2; i++) {
    const branch = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04 * scale, 0.08 * scale, 0.8 * scale, 5),
      new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.95 })
    );
    const a = rand(0, Math.PI * 2);
    branch.position.set(
      Math.cos(a) * 0.2 * scale,
      h * 0.6 + i * 0.3 * scale,
      Math.sin(a) * 0.2 * scale
    );
    branch.rotation.z = Math.cos(a) * 0.6;
    branch.rotation.x = Math.sin(a) * 0.6;
    g.add(branch);
  }

  // Spherical canopy (multiple overlapping spheres)
  const canopyColor = [0x2d7a3e, 0x358844, 0x3a9550][randInt(0, 2)];
  const canopyMat = new THREE.MeshStandardMaterial({
    color: canopyColor, roughness: 0.7, flatShading: true
  });

  const mainCanopy = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.5 * scale, 1),
    canopyMat
  );
  mainCanopy.position.y = h + 0.8 * scale;
  mainCanopy.castShadow = true;
  mainCanopy.receiveShadow = true;
  // Deform slightly
  const cPos = mainCanopy.geometry.attributes.position;
  for (let i = 0; i < cPos.count; i++) {
    cPos.setX(i, cPos.getX(i) + rand(-0.15, 0.15) * scale);
    cPos.setY(i, cPos.getY(i) + rand(-0.1, 0.15) * scale);
    cPos.setZ(i, cPos.getZ(i) + rand(-0.15, 0.15) * scale);
  }
  mainCanopy.geometry.computeVertexNormals();
  g.add(mainCanopy);

  // Extra small canopy blobs
  for (let i = 0; i < 3; i++) {
    const blob = new THREE.Mesh(
      new THREE.IcosahedronGeometry(rand(0.5, 0.9) * scale, 1),
      canopyMat
    );
    blob.position.set(
      rand(-0.8, 0.8) * scale,
      h + rand(0.4, 1.2) * scale,
      rand(-0.8, 0.8) * scale
    );
    blob.castShadow = true;
    g.add(blob);
  }

  const ty = getTerrainY(x, z);
  g.position.set(x, ty, z);
  g.rotation.y = rand(0, Math.PI * 2);
  scene.add(g);
  return g;
}

function createBirchTree(x, z, scale = 1) {
  const g = new THREE.Group();
  const h = rand(2.0, 3.0) * scale;

  // White trunk with dark marks
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08 * scale, 0.14 * scale, h, 6),
    new THREE.MeshStandardMaterial({ color: 0xE8DDD0, roughness: 0.6 })
  );
  trunk.position.y = h / 2;
  trunk.castShadow = true;
  g.add(trunk);

  // Dark bark marks
  for (let i = 0; i < 5; i++) {
    const mark = new THREE.Mesh(
      new THREE.BoxGeometry(0.06 * scale, 0.03 * scale, 0.18 * scale),
      new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 })
    );
    mark.position.set(
      0.09 * scale * Math.cos(i * 1.3),
      rand(0.3, h - 0.3) * (1 / scale),
      0.09 * scale * Math.sin(i * 1.3)
    );
    mark.rotation.y = i * 1.3;
    g.add(mark);
  }

  // Light, airy foliage
  const foliageMat = new THREE.MeshStandardMaterial({
    color: 0x88cc44, roughness: 0.6, transparent: true, opacity: 0.9, flatShading: true
  });
  for (let i = 0; i < 4; i++) {
    const leaf = new THREE.Mesh(
      new THREE.IcosahedronGeometry(rand(0.4, 0.7) * scale, 1),
      foliageMat
    );
    leaf.position.set(
      rand(-0.5, 0.5) * scale,
      h + rand(-0.2, 0.6) * scale,
      rand(-0.5, 0.5) * scale
    );
    leaf.castShadow = true;
    g.add(leaf);
  }

  const ty = getTerrainY(x, z);
  g.position.set(x, ty, z);
  scene.add(g);
  return g;
}

// ─── Rocks (detailed clusters) ───
function createRockCluster(x, z, mainScale = 1) {
  const g = new THREE.Group();
  const count = randInt(1, 3);
  const rockColors = [0x777777, 0x888888, 0x999999, 0x6a6a6a, 0x7a7a70];

  for (let i = 0; i < count; i++) {
    const s = mainScale * rand(0.3, 1.0);
    const geo = new THREE.DodecahedronGeometry(0.5 * s, randInt(0, 1));
    // Deform vertices for organic look
    const rp = geo.attributes.position;
    for (let j = 0; j < rp.count; j++) {
      rp.setX(j, rp.getX(j) * rand(0.8, 1.2));
      rp.setY(j, rp.getY(j) * rand(0.7, 1.0));
      rp.setZ(j, rp.getZ(j) * rand(0.8, 1.2));
    }
    geo.computeVertexNormals();

    const rock = new THREE.Mesh(geo,
      new THREE.MeshStandardMaterial({
        color: rockColors[randInt(0, rockColors.length - 1)],
        roughness: 0.92, flatShading: true
      })
    );
    rock.position.set(rand(-0.4, 0.4) * mainScale, 0.25 * s, rand(-0.4, 0.4) * mainScale);
    rock.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
    rock.castShadow = true;
    rock.receiveShadow = true;
    g.add(rock);
  }

  // Moss patches on some rocks
  if (Math.random() > 0.4) {
    const moss = new THREE.Mesh(
      new THREE.SphereGeometry(0.2 * mainScale, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.9, flatShading: true })
    );
    moss.position.set(rand(-0.2, 0.2), 0.3 * mainScale, rand(-0.2, 0.2));
    moss.scale.y = 0.4;
    g.add(moss);
  }

  const ty = getTerrainY(x, z);
  g.position.set(x, ty, z);
  scene.add(g);
  return g;
}

// ─── Grass patches (instanced) ───
function createGrass() {
  const bladeGeo = new THREE.BufferGeometry();
  const verts = new Float32Array([
    -0.04, 0, 0,  0.04, 0, 0,  0, 0.4, 0.02,
    0.04, 0, 0,   0, 0.4, 0.02, 0, 0.35, -0.02
  ]);
  bladeGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  bladeGeo.computeVertexNormals();

  const grassMat = new THREE.MeshStandardMaterial({
    color: 0x4a9a3a, roughness: 0.8, side: THREE.DoubleSide, flatShading: true
  });

  const count = 2000;
  const mesh = new THREE.InstancedMesh(bladeGeo, grassMat, count);
  const matrix = new THREE.Matrix4();
  const color = new THREE.Color();

  for (let i = 0; i < count; i++) {
    const x = rand(-30, 30);
    const z = rand(-30, 30);
    // Skip near water
    if (Math.sqrt((x + 14) ** 2 + (z - 10) ** 2) < 6) continue;
    const y = getTerrainY(x, z);
    const scale = rand(0.5, 1.5);
    matrix.makeRotationY(rand(0, Math.PI * 2));
    matrix.scale(new THREE.Vector3(scale, scale, scale));
    matrix.setPosition(x, y, z);
    mesh.setMatrixAt(i, matrix);

    const g = rand(0.35, 0.65);
    color.setRGB(rand(0.15, 0.3), g, rand(0.1, 0.2));
    mesh.setColorAt(i, color);
  }
  mesh.instanceMatrix.needsUpdate = true;
  mesh.instanceColor.needsUpdate = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}
createGrass();

// ─── Flowers (detailed) ───
function createFlowers() {
  const flowerConfigs = [
    { color: 0xff6b9d, stem: 0x3a7a2a }, // Pink
    { color: 0xffd93d, stem: 0x3a7a2a }, // Yellow
    { color: 0xff8a5c, stem: 0x4a8a3a }, // Orange
    { color: 0xc9b1ff, stem: 0x3a7a2a }, // Purple
    { color: 0xffffff, stem: 0x4a8a3a }, // White
    { color: 0xff4444, stem: 0x3a7a2a }, // Red
  ];

  for (let i = 0; i < 60; i++) {
    const x = rand(-28, 28);
    const z = rand(-28, 28);
    if (Math.sqrt((x + 14) ** 2 + (z - 10) ** 2) < 6) continue;

    const conf = flowerConfigs[randInt(0, flowerConfigs.length - 1)];
    const g = new THREE.Group();

    // Stem
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.01, 0.015, rand(0.2, 0.4), 4),
      new THREE.MeshStandardMaterial({ color: conf.stem })
    );
    stem.position.y = 0.15;
    g.add(stem);

    // Petals
    const petalCount = randInt(4, 6);
    for (let p = 0; p < petalCount; p++) {
      const petal = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 5, 5),
        new THREE.MeshStandardMaterial({ color: conf.color, roughness: 0.5 })
      );
      const a = (p / petalCount) * Math.PI * 2;
      petal.position.set(Math.cos(a) * 0.08, 0.32, Math.sin(a) * 0.08);
      petal.scale.y = 0.5;

      new THREE.SphereGeometry(0.04, 5, 5),

    );
    center.position.y = 0.32;

    g.position.set(x, y, z);
    scene.add(g);
  }

  for (let row = -1.5; row <= 1.5; row += 0.5) {

      );
      head.position.set(sx, 0.2 + h + 0.05, sz);

  // Wooden fence (detailed posts + rails)

    { axis: 'x', pos: -2.2, range: [-2.2, 2.2] },
    { axis: 'x', pos: 2.2, range: [-2.2, 2.2] },
    { axis: 'z', pos: -2.2, range: [-2.2, 2.2] },
    { axis: 'z', pos: 2.2, range: [-2.2, 2.2] },
  ];

  for (const side of sides) {
    for (let t = side.range[0]; t <= side.range[1]; t += 1.1) {
      const post = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.7, 0.08),
        fenceMat
      );
      if (side.axis === 'x') post.position.set(t, 0.45, side.pos);
      else post.position.set(side.pos, 0.45, t);
      post.castShadow = true;
      g.add(post);
    }
    // Rails
    for (const rh of [0.35, 0.65]) {
      const rail = new THREE.Mesh(
        new THREE.BoxGeometry(
          side.axis === 'x' ? 4.4 : 0.05,
          0.05,
          side.axis === 'z' ? 4.4 : 0.05

        fenceMat
      );
      if (side.axis === 'x') rail.position.set(0, rh, side.pos);
      else rail.position.set(side.pos, rh, 0);
      g.add(rail);
    }
  }

  // Scarecrow
  const scarecrow = new THREE.Group();
  const scPole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.05, 1.8, 5),
    new THREE.MeshStandardMaterial({ color: 0x6a5030 })

  const scArm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1.2, 5),

  scArm.position.y = 1.4;
  scArm.rotation.z = Math.PI / 2;
  scarecrow.add(scArm);
  const scHead = new THREE.Mesh(

  scHead.position.y = 1.9;

  const scHat = new THREE.Mesh(

  scHat.position.y = 2.1;

  scarecrow.position.set(1.5, 0.2, 1.5);

  g.position.copy(pos);

// ─── UI ───
function renderBuildMenu() {
  const menu = document.getElementById('build-menu');
  menu.innerHTML = '';
  for (const [key, b] of Object.entries(BUILDINGS)) {
    const btn = document.createElement('div');
    btn.className = 'build-btn';
    if (b.built) btn.classList.add('built');
    else if (!b.unlocked) btn.classList.add('locked');
    if (selectedBuilding === key) btn.classList.add('active');

    const icons = { wood: '🪵', stone: '🪨', water: '💧', food: '🌾', gold: '🪙' };
    const costStr = Object.entries(b.cost)
      .map(([r, v]) => `${icons[r]}${v}`).join(' ');

    btn.innerHTML = `
      <div class="b-icon">${b.icon}</div>
      <div class="b-name">${b.name}</div>
      <div class="b-cost">${b.built ? '&#10003; Construit' : costStr}</div>
    `;

    if (!b.built && b.unlocked) {
      btn.addEventListener('click', () => selectBuilding(key));
    }
    menu.appendChild(btn);
  }
}

function selectBuilding(key) {
  selectedBuilding = selectedBuilding === key ? null : key;
  if (selectedBuilding) showGhost(key); else removeGhost();
  renderBuildMenu();
}

function showGhost(key) {
  removeGhost();
  const b = BUILDINGS[key];
  const p = buildingPositions[key];
  const ghost = new THREE.Mesh(
    new THREE.BoxGeometry(b.size[0], 2.5, b.size[1]),
    new THREE.MeshStandardMaterial({
      color: canAfford(b.cost) ? 0x4CAF50 : 0xff4444,
      transparent: true, opacity: 0.25, wireframe: false
    })
  );
  // Wireframe overlay
  const wire = new THREE.Mesh(
    new THREE.BoxGeometry(b.size[0], 2.5, b.size[1]),
    new THREE.MeshBasicMaterial({
      color: canAfford(b.cost) ? 0x66bb6a : 0xff6666,
      wireframe: true, transparent: true, opacity: 0.4
    })
  );
  ghost.add(wire);
  ghost.position.set(p.x, p.y + 1.25, p.z);
  scene.add(ghost);
  buildingGhost = ghost;
}

function removeGhost() {
  if (buildingGhost) { scene.remove(buildingGhost); buildingGhost = null; }
}

function canAfford(cost) {
  return Object.entries(cost).every(([r, v]) => (resources[r] || 0) >= v);
}

function buildStructure(key) {
  const b = BUILDINGS[key];
  if (!canAfford(b.cost)) { showMessage('Ressources insuffisantes !', '#ff4444'); return; }

  for (const [r, v] of Object.entries(b.cost)) resources[r] -= v;
  b.built = true;
  removeGhost();
  selectedBuilding = null;

  const p = buildingPositions[key];
  const mesh = buildingCreators[key](p);

  // Build animation: rise from ground
  const targetY = mesh.position.y;
  mesh.position.y -= 3;
  mesh.scale.set(0.01, 0.01, 0.01);
  const buildAnim = { progress: 0 };
  const animateBuild = () => {
    buildAnim.progress += 0.025;
    const t = Math.min(buildAnim.progress, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
    mesh.position.y = targetY - 3 + 3 * ease;
    mesh.scale.setScalar(ease);
    if (t < 1) requestAnimationFrame(animateBuild);
  };
  animateBuild();

  builtStructures.push({ key, mesh, position: p });

  for (const [k, bd] of Object.entries(BUILDINGS)) {
    if (bd.prerequisite === key) bd.unlocked = true;
  }
  if (b.production) productionTimers[key] = 0;

  showMessage(`${b.name} construit !`, '#4CAF50');
  updateHUD();
  renderBuildMenu();

  if (Object.values(BUILDINGS).every(b => b.built)) {
    setTimeout(() => { document.getElementById('win-screen').style.display = 'flex'; }, 2000);
  }
}

// ─── Interaction ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onPointerDown(e) {
  if (!gameStarted) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (selectedBuilding) {
    const p = buildingPositions[selectedBuilding];
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -p.y);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, pt);
    if (pt && pt.distanceTo(p) < 5) { buildStructure(selectedBuilding); return; }
  }

  const allMeshes = harvestables.flatMap(h =>
    h.mesh instanceof THREE.Group ? h.mesh.children : [h.mesh]
  );
  const intersects = raycaster.intersectObjects(allMeshes, true);
  if (intersects.length === 0) return;

  const hit = intersects[0].object;
  for (const h of harvestables) {
    let isHit = false;
    if (h.mesh instanceof THREE.Group) h.mesh.traverse(c => { if (c === hit) isHit = true; });
    else if (h.mesh === hit) isHit = true;

    if (isHit && h.hp > 0) {
      h.hp--;

      // Shake feedback
      const orig = h.mesh.position.clone();
      h.mesh.position.x += rand(-0.3, 0.3);
      h.mesh.position.z += rand(-0.1, 0.1);
      setTimeout(() => { if (h.mesh.parent) h.mesh.position.copy(orig); }, 120);

      // Spawn hit particles
      for (let p = 0; p < 5; p++) {
        const particleGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
        const particleMat = new THREE.MeshStandardMaterial({
          color: h.type === 'tree' ? 0x8B5E3C : 0x888888, roughness: 0.9
        });
        const particle = new THREE.Mesh(particleGeo, particleMat);
        particle.position.copy(intersects[0].point);
        scene.add(particle);
        particles.push({
          mesh: particle, type: 'debris',
          vel: new THREE.Vector3(rand(-2, 2), rand(1, 4), rand(-2, 2)),
          life: rand(0.5, 1.2), maxLife: 1.2
        });
      }

      if (h.hp <= 0) {
        resources[h.resource] += h.amount;
        const cls = h.resource === 'wood' ? 'harvest-wood' : 'harvest-stone';
        showPopup(e.clientX, e.clientY, `+${h.amount} ${h.resource === 'wood' ? '🪵' : '🪨'}`, cls);

        // Shrink & remove
        const idx = harvestables.indexOf(h);
        let shrinkScale = 1;
        const shrink = () => {
          shrinkScale -= 0.06;
          if (shrinkScale > 0) {
            h.mesh.scale.setScalar(shrinkScale);
            h.mesh.position.y -= 0.02;
            requestAnimationFrame(shrink);
          } else {
            scene.remove(h.mesh);
            harvestables.splice(idx, 1);
          }
        };
        shrink();

        // Respawn
        setTimeout(() => {
          const nx = rand(-25, 25), nz = rand(-25, 25);
          if (h.type === 'tree') {
            const s = rand(0.8, 1.3);
            const type = randInt(0, 2);
            let tree;
            if (type === 0) tree = createPineTree(nx, nz, s);
            else if (type === 1) tree = createOakTree(nx, nz, s);
            else tree = createBirchTree(nx, nz, s);
            harvestables.push({ type: 'tree', treeType: type, mesh: tree, hp: 3, resource: 'wood', amount: 3 });
          } else {
            const s = rand(0.7, 1.4);
            const rock = createRockCluster(nx, nz, s);
            harvestables.push({ type: 'rock', mesh: rock, hp: 3, resource: 'stone', amount: 2 });
          }
        }, 12000);

        updateHUD();
        renderBuildMenu();
      } else {
        showPopup(e.clientX, e.clientY, `${h.hp}/3`);
      }
      return;
    }
  }
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);

// Tooltip
function onPointerMove(e) {
  if (!gameStarted) return;
  const tooltip = document.getElementById('tooltip');
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = harvestables.filter(h => h.hp > 0).flatMap(h =>
    h.mesh instanceof THREE.Group ? h.mesh.children : [h.mesh]
  );
  const intersects = raycaster.intersectObjects(meshes, true);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    for (const h of harvestables) {
      let isHit = false;
      if (h.mesh instanceof THREE.Group) h.mesh.traverse(c => { if (c === hit) isHit = true; });
      else if (h.mesh === hit) isHit = true;
      if (isHit && h.hp > 0) {
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 15 + 'px';
        tooltip.style.top = e.clientY - 10 + 'px';
        const name = h.type === 'tree' ? 'Arbre' : 'Rocher';
        const action = h.type === 'tree' ? 'couper' : 'miner';
        tooltip.innerHTML = `<strong>${name}</strong> (${h.hp}/3)<br><span style="opacity:0.6">Clic pour ${action}</span>`;
        renderer.domElement.style.cursor = 'pointer';
        return;
      }
    }
  }
  tooltip.style.display = 'none';
  renderer.domElement.style.cursor = selectedBuilding ? 'crosshair' : 'grab';
}
renderer.domElement.addEventListener('pointermove', onPointerMove);

// ─── HUD ───
function updateHUD() {
  for (const [key, val] of Object.entries(resources)) {
    const el = document.getElementById(`r-${key}`);
    if (el) {
      const prev = parseInt(el.textContent) || 0;
      if (val !== prev) {
        el.textContent = val;
        el.parentElement.style.transform = 'scale(1.15)';
        setTimeout(() => { el.parentElement.style.transform = 'scale(1)'; }, 200);
      }
    }
  }
}

function showPopup(x, y, text, cls = 'production') {
  const popup = document.createElement('div');
  popup.className = `popup ${cls}`;
  popup.textContent = text;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1400);
}

function showMessage(text, color = '#fff') {
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.textContent = text;
  msg.style.borderLeft = `3px solid ${color}`;
  document.getElementById('messages').appendChild(msg);
  setTimeout(() => msg.remove(), 3000);
}

// ─── Production ───
function updateProduction(dt) {
  for (const [key, b] of Object.entries(BUILDINGS)) {
    if (!b.built || !b.production) continue;
    if (!productionTimers[key]) productionTimers[key] = 0;
    productionTimers[key] += dt;

    if (productionTimers[key] >= PRODUCTION_INTERVAL) {
      productionTimers[key] = 0;

      if (b.consumption) {
        let ok = true;
        for (const [r, v] of Object.entries(b.consumption)) {
          if (resources[r] < v) { ok = false; break; }
        }
        if (!ok) continue;
        for (const [r, v] of Object.entries(b.consumption)) resources[r] -= v;
      }

      for (const [r, v] of Object.entries(b.production)) resources[r] += v;

      const struct = builtStructures.find(s => s.key === key);
      if (struct) {
        const sp = struct.position.clone();
        sp.y += 3;
        sp.project(camera);
        const sx = (sp.x * 0.5 + 0.5) * innerWidth;
        const sy = (-sp.y * 0.5 + 0.5) * innerHeight;
        const icons = { wood: '🪵', stone: '🪨', water: '💧', food: '🌾', gold: '🪙' };
        const prodText = Object.entries(b.production)
          .map(([r, v]) => `+${v}${icons[r]}`).join(' ');
        showPopup(sx, sy, prodText);
      }
      updateHUD();
    }
  }
}

// ─── Day/Night ───
let isNight = false;
let firefliesSpawned = false;

function updateDayNight(time) {
  const dayLen = 80;
  const phase = (time % dayLen) / dayLen;

  const sunAngle = phase * Math.PI * 2 - Math.PI / 2;
  sunLight.position.set(Math.cos(sunAngle) * 30, Math.sin(sunAngle) * 30 + 8, 15);

  let skyColor, sunI, ambI;
  if (phase < 0.2) { // Dawn
    const t = phase / 0.2;
    skyColor = new THREE.Color(0x0a0a2e).lerp(new THREE.Color(0xff9966), t);
    sunI = lerp(0.2, 1.5, t);
    ambI = lerp(0.15, 0.4, t);
    bloomPass.strength = lerp(0.5, 0.3, t);
  } else if (phase < 0.5) { // Day
    const t = (phase - 0.2) / 0.3;
    skyColor = new THREE.Color(0xff9966).lerp(new THREE.Color(0x87CEEB), Math.min(t * 2, 1));
    sunI = 1.8;
    ambI = 0.45;
    bloomPass.strength = 0.25;
  } else if (phase < 0.7) { // Dusk
    const t = (phase - 0.5) / 0.2;
    skyColor = new THREE.Color(0x87CEEB).lerp(new THREE.Color(0xff5533), t);
    sunI = lerp(1.8, 0.6, t);
    ambI = lerp(0.45, 0.25, t);
    bloomPass.strength = lerp(0.25, 0.5, t);
    sunLight.color.lerp(new THREE.Color(0xff6633), t * 0.5);
  } else { // Night
    const t = (phase - 0.7) / 0.3;
    skyColor = new THREE.Color(0xff5533).lerp(new THREE.Color(0x0a0a2e), Math.min(t * 2, 1));
    sunI = lerp(0.6, 0.15, t);
    ambI = lerp(0.25, 0.12, t);
    bloomPass.strength = lerp(0.5, 0.8, t);
  }

  scene.background = skyColor;
  scene.fog.color = skyColor;
  sunLight.intensity = sunI;
  ambientLight.intensity = ambI;

  // Cloud opacity based on time
  cloudGroup.children.forEach(c => {
    c.children.forEach(blob => {
      if (blob.material) blob.material.opacity = phase > 0.7 ? 0.3 : 0.7;
    });
  });

  // Fireflies at night
  const nowNight = phase > 0.7 || phase < 0.15;
  if (nowNight && !firefliesSpawned) {
    for (let i = 0; i < 15; i++) spawnFirefly();
    firefliesSpawned = true;
  }
  if (!nowNight && firefliesSpawned) {
    // Remove fireflies
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].type === 'firefly') {
        scene.remove(particles[i].mesh);
        particles.splice(i, 1);
      }
    }
    firefliesSpawned = false;
  }

  // Day counter
  const newDay = Math.floor(time / dayLen) + 1;
  if (newDay !== dayCount) {
    dayCount = newDay;
    document.getElementById('day-indicator').textContent = `Jour ${dayCount}`;
  }
}

// ─── Animate ───
const clock = new THREE.Clock();
let leafTimer = 0;
let smokeTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameStarted) {
    gameTime += dt;
    updateProduction(dt);
    updateDayNight(gameTime);

    // Windmill blades
    for (const s of builtStructures) {
      if (s.key === 'windmill' && s.mesh._blades) {
        s.mesh._blades.rotation.z += dt * 0.8;
      }
    }

    // Tree sway
    for (const h of harvestables) {
      if (h.type === 'tree' && h.mesh.parent) {
        h.mesh.rotation.z = Math.sin(gameTime * 1.2 + h.mesh.position.x * 0.5) * 0.025;
        h.mesh.rotation.x = Math.sin(gameTime * 0.8 + h.mesh.position.z * 0.3) * 0.015;
      }
    }

    // Animate chickens
    for (const ch of animatedChickens) {
      ch.phase += dt * 2;
      const m = ch.mesh;
      m.position.x = ch.basePos.x + Math.sin(ch.phase * 0.7) * 0.3;
      m.position.z = ch.basePos.z + Math.cos(ch.phase * 0.5) * 0.2;
      m.rotation.y = Math.atan2(
        Math.cos(ch.phase * 0.7) * 0.3,
        -Math.sin(ch.phase * 0.5) * 0.2
      );
      // Pecking motion
      if (Math.sin(ch.phase * 3) > 0.8) {
        m.rotation.x = 0.3;
      } else {
        m.rotation.x = 0;
      }
    }

    // Clouds drift
    for (const cloud of cloudGroup.children) {
      cloud.position.x += cloud._speed * dt;
      if (cloud.position.x > 55) cloud.position.x = -55;
    }

    // Particles update
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      if (p.type === 'butterfly') {
        p.phase += dt * 3;
        p.mesh.position.x += Math.sin(p.phase * 0.5) * dt * 0.5;
        p.mesh.position.z += Math.cos(p.phase * 0.3) * dt * 0.5;
        p.mesh.position.y += Math.sin(p.phase) * dt * 0.3;
        // Wing flap
        p.mesh.children.forEach(wing => {
          if (wing._side) {
            wing.rotation.y = wing._side * (0.3 + Math.sin(p.phase * 8) * 0.5);
          }
        });
        // Keep in bounds
        if (Math.abs(p.mesh.position.x) > 25) p.vel.x *= -1;
        if (Math.abs(p.mesh.position.z) > 25) p.vel.z *= -1;
        const minY = getTerrainY(p.mesh.position.x, p.mesh.position.z) + 0.5;
        if (p.mesh.position.y < minY) p.mesh.position.y = minY;
        if (p.mesh.position.y > 5) p.mesh.position.y = 5;
      }

      if (p.type === 'firefly') {
        p.phase += dt * 2;
        p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
        p.mesh.position.y += Math.sin(p.phase) * dt * 0.3;
        // Pulse glow
        p.mesh.material.emissiveIntensity = 1.5 + Math.sin(p.phase * 3) * 1.5;
        p.mesh.material.opacity = 0.5 + Math.sin(p.phase * 3) * 0.3;
        // Wander
        if (Math.random() < 0.02) {
          p.vel.set(rand(-0.3, 0.3), rand(-0.1, 0.1), rand(-0.3, 0.3));
        }
        if (Math.abs(p.mesh.position.x) > 22) p.vel.x *= -1;
        if (Math.abs(p.mesh.position.z) > 22) p.vel.z *= -1;
      }

      if (p.type === 'leaf') {
        p.life -= dt;
        p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
        p.mesh.rotation.x += p.spin.x * dt;
        p.mesh.rotation.z += p.spin.z * dt;
        // Sway
        p.vel.x += Math.sin(gameTime * 2 + p.mesh.position.y) * dt * 0.5;
        const ty = getTerrainY(p.mesh.position.x, p.mesh.position.z);
        if (p.life <= 0 || p.mesh.position.y <= ty) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
        }
      }

      if (p.type === 'debris') {
        p.life -= dt;
        p.vel.y -= 9.8 * dt; // gravity
        p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
        p.mesh.rotation.x += dt * 5;
        p.mesh.rotation.z += dt * 3;
        const s = Math.max(p.life / p.maxLife, 0);
        p.mesh.scale.setScalar(s);
        if (p.life <= 0) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
        }
      }
    }

    // Smoke particles
    smokeTimer += dt;
    const cabinStruct = builtStructures.find(s => s.key === 'cabin');
    if (cabinStruct && smokeTimer > 0.3) {
      smokeTimer = 0;
      spawnSmoke(cabinStruct.mesh._chimneyPos);
    }

    for (let i = smokeParticles.length - 1; i >= 0; i--) {
      const sp = smokeParticles[i];
      sp.life += dt;
      sp.mesh.position.add(sp.vel.clone().multiplyScalar(dt));
      sp.vel.x += rand(-0.1, 0.1) * dt;
      const t = sp.life / sp.maxLife;
      sp.mesh.scale.setScalar(1 + t * 2);
      sp.mesh.material.opacity = 0.35 * (1 - t);
      if (sp.life >= sp.maxLife) {
        scene.remove(sp.mesh);
        smokeParticles.splice(i, 1);
      }
    }

    // Spawn falling leaves occasionally
    leafTimer += dt;
    if (leafTimer > 2 && harvestables.some(h => h.type === 'tree')) {
      leafTimer = 0;
      if (Math.random() > 0.4) spawnLeaf();
    }

    // Water animation
    water.position.y = getTerrainY(-14, 10) + 0.15 + Math.sin(gameTime * 1.5) * 0.03;
    water.material.color.setHSL(0.55, 0.6, 0.35 + Math.sin(gameTime * 2) * 0.03);

    // Ghost update
    if (buildingGhost && selectedBuilding) {
      const afford = canAfford(BUILDINGS[selectedBuilding].cost);
      buildingGhost.material.color.set(afford ? 0x4CAF50 : 0xff4444);
      buildingGhost.children[0].material.color.set(afford ? 0x66bb6a : 0xff6666);
      buildingGhost.position.y += Math.sin(gameTime * 3) * 0.002;
    }
  }

  controls.update();
  composer.render();
}
animate();

// ─── Start ───
window.startGame = function () {
  document.getElementById('intro').style.display = 'none';
  gameStarted = true;
  renderBuildMenu();
  updateHUD();
  showMessage('Clique sur les arbres et rochers pour recolter !', '#66bb6a');
  setTimeout(() => showMessage('Construis ta cabane en premier !', '#FFD54F'), 3500);
};

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { selectedBuilding = null; removeGhost(); renderBuildMenu(); }
  const num = parseInt(e.key);
  if (num >= 1 && num <= 6) {
    const keys = Object.keys(BUILDINGS);
    if (num <= keys.length) {
      const key = keys[num - 1];
      if (BUILDINGS[key].unlocked && !BUILDINGS[key].built) selectBuilding(key);
    }
  }
});
</script>
